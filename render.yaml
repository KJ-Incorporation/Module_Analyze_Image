services:
  - type: web
    name: weighty-vision-module
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: WEIGHTY_POSE_MODEL_PATH
        value: /opt/weighty/models/pose_landmarker_lite.task
